name: Release Publish

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-pages
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      IPBES_RELEASE_DATE: ${{ github.event.release.published_at }}
      IPBES_BUILD_PDF: "true"
      IPBES_OUTPUT_DIR: _site
      ZENODO_TARGET: ${{ vars.ZENODO_TARGET }}
      ZENODO_API_BASE: ${{ vars.ZENODO_API_BASE }}
      ZENODO_SANDBOX_API_BASE: ${{ vars.ZENODO_SANDBOX_API_BASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Resolve Zenodo target config
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_SANDBOX_TOKEN: ${{ secrets.ZENODO_SANDBOX_TOKEN }}
        run: |
          python3 - <<'PY'
          import os
          import sys

          def fail(message):
              print(message, file=sys.stderr)
              sys.exit(1)

          raw_target = os.getenv("ZENODO_TARGET", "").strip().lower()
          target = raw_target if raw_target in ("sandbox", "production") else "production"
          if raw_target and raw_target not in ("sandbox", "production"):
              print(
                  f"Warning: invalid ZENODO_TARGET={raw_target!r}; defaulting to production.",
                  file=sys.stderr,
              )

          if target == "sandbox":
              base_var = "ZENODO_SANDBOX_API_BASE"
              token_var = "ZENODO_SANDBOX_TOKEN"
          else:
              base_var = "ZENODO_API_BASE"
              token_var = "ZENODO_TOKEN"

          base = os.getenv(base_var, "").strip().rstrip("/")
          token = os.getenv(token_var, "").strip()
          if not base:
              fail(f"ZENODO_TARGET={target}: missing required setting `{base_var}`.")
          if not token:
              fail(f"ZENODO_TARGET={target}: missing required setting `{token_var}`.")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as envf:
              envf.write(f"ACTIVE_ZENODO_TARGET={target}\n")
              envf.write(f"ACTIVE_ZENODO_API_BASE={base}\n")
              envf.write(f"ACTIVE_ZENODO_TOKEN={token}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write(f"Zenodo target selected: `{target}`\n")
              summary.write(f"Zenodo API base source: `{base_var}`\n")
              summary.write("Zenodo token source selected successfully.\n")
          PY

      - name: Read version and concept DOI from frontmatter
        id: frontmatter
        run: |
          Rscript - <<'RS'
          meta <- tryCatch(
            rmarkdown::yaml_front_matter("IPBES_Data_Vision.qmd"),
            error = function(e) list()
          )

          scalar <- function(x) {
            if (is.null(x) || length(x) == 0) {
              return("")
            }
            as.character(x[[1]])
          }

          fail <- function(msg) {
            write(msg, stderr())
            quit(status = 1)
          }

          version <- scalar(meta$version)
          concept_doi <- scalar(meta$concept_doi)
          if (!nzchar(version)) {
            fail("Missing `version` in YAML frontmatter of IPBES_Data_Vision.qmd.")
          }
          if (!nzchar(concept_doi)) {
            fail("Missing `concept_doi` in YAML frontmatter of IPBES_Data_Vision.qmd.")
          }

          conceptrecid <- sub("^.*(?:zenodo\\.|/)([0-9]+)$", "\\1", concept_doi, perl = TRUE)
          if (!grepl("^[0-9]+$", conceptrecid)) {
            fail(sprintf("Could not derive Zenodo concept record id from concept_doi `%s`.", concept_doi))
          }

          env_path <- Sys.getenv("GITHUB_ENV")
          out_path <- Sys.getenv("GITHUB_OUTPUT")

          cat(sprintf("IPBES_VERSION=%s\n", version), file = env_path, append = TRUE)
          cat(sprintf("IPBES_CONCEPT_DOI=%s\n", concept_doi), file = env_path, append = TRUE)
          cat(sprintf("ZENODO_CONCEPTRECID=%s\n", conceptrecid), file = env_path, append = TRUE)

          cat(sprintf("frontmatter_version=%s\n", version), file = out_path, append = TRUE)
          cat(sprintf("frontmatter_concept_doi=%s\n", concept_doi), file = out_path, append = TRUE)
          cat(sprintf("frontmatter_conceptrecid=%s\n", conceptrecid), file = out_path, append = TRUE)
          RS

      - name: Reserve Zenodo version DOI
        id: reserve_doi
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          def fail(message):
              print(message, file=sys.stderr)
              sys.exit(1)

          def request_json(method, url, payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Content-Type", "application/json")
              try:
                  with urllib.request.urlopen(req) as resp:
                      body = resp.read().decode("utf-8")
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode("utf-8", errors="replace")
                  fail(f"Zenodo API error ({exc.code}) on {url}: {details}")
              except urllib.error.URLError as exc:
                  fail(f"Zenodo API connection error on {url}: {exc}")
              if not body.strip():
                  return {}
              return json.loads(body)

          target = os.getenv("ACTIVE_ZENODO_TARGET", "").strip() or "production"
          base = os.getenv("ACTIVE_ZENODO_API_BASE", "").strip().rstrip("/")
          token = os.getenv("ACTIVE_ZENODO_TOKEN", "").strip()
          conceptrecid = os.getenv("ZENODO_CONCEPTRECID", "").strip()
          if not token:
              fail(f"ZENODO_TARGET={target}: missing ACTIVE_ZENODO_TOKEN from resolve step.")
          if not base:
              fail(f"ZENODO_TARGET={target}: missing ACTIVE_ZENODO_API_BASE from resolve step.")
          if not conceptrecid:
              fail(f"ZENODO_TARGET={target}: missing ZENODO_CONCEPTRECID derived from frontmatter concept_doi.")

          token_q = urllib.parse.quote(token, safe="")
          query = urllib.parse.quote(f"conceptrecid:{conceptrecid}", safe="")
          search_url = f"{base}/api/deposit/depositions?access_token={token_q}&q={query}&sort=mostrecent"
          search_resp = request_json("GET", search_url)
          if not isinstance(search_resp, list) or len(search_resp) == 0:
              fail(f"No Zenodo depositions found for conceptrecid={conceptrecid}.")

          latest = search_resp[0]
          latest_id = latest.get("id")
          if latest_id is None:
              fail("Zenodo search result missing deposition id.")

          new_version_url = f"{base}/api/deposit/depositions/{latest_id}/actions/newversion?access_token={token_q}"
          new_version_resp = request_json("POST", new_version_url)
          draft_url = (new_version_resp.get("links") or {}).get("latest_draft")
          if not draft_url:
              fail("Zenodo newversion response missing latest_draft URL.")
          if "access_token=" not in draft_url:
              separator = "&" if "?" in draft_url else "?"
              draft_url = f"{draft_url}{separator}access_token={token_q}"

          draft_resp = request_json("GET", draft_url)
          draft_id = draft_resp.get("id")
          if draft_id is None:
              fail("Zenodo draft response missing deposition id.")
          metadata = draft_resp.get("metadata") or {}
          prereserve = metadata.get("prereserve_doi") or {}
          doi = (prereserve.get("doi") or draft_resp.get("doi") or "").strip()
          if not doi:
              fail("Reserved DOI was not found in Zenodo draft response.")

          doi_url = f"https://doi.org/{doi}"
          draft_links = draft_resp.get("links") or {}
          draft_html_url = (
              draft_links.get("latest_draft_html")
              or draft_links.get("html")
              or ""
          )
          print(f"Reserved Zenodo DOI: {doi}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"reserved_doi={doi}\n")
              out.write(f"draft_deposition_id={draft_id}\n")
              if draft_html_url:
                  out.write(f"draft_html_url={draft_html_url}\n")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as envf:
              envf.write(f"IPBES_DOI={doi}\n")
              envf.write(f"IPBES_DOI_URL={doi_url}\n")
          PY

      - name: Append version DOI to release notes
        uses: actions/github-script@v7
        env:
          RESERVED_DOI: ${{ steps.reserve_doi.outputs.reserved_doi }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseId = context.payload.release.id;
            const doiLine = `Version DOI: https://doi.org/${process.env.RESERVED_DOI}`;

            const { data: release } = await github.rest.repos.getRelease({
              owner,
              repo,
              release_id: releaseId,
            });

            const body = release.body || "";
            const existingLinePattern = /^Version DOI:\s+https:\/\/doi\.org\/\S+\s*$/m;
            let nextBody = body;

            if (existingLinePattern.test(body)) {
              if (!body.includes(doiLine)) {
                nextBody = body.replace(existingLinePattern, doiLine);
              }
            } else {
              nextBody = body.trim().length > 0 ? `${body}\n\n${doiLine}` : doiLine;
            }

            if (nextBody !== body) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: releaseId,
                body: nextBody,
              });
              core.info("Version DOI line appended to release notes.");
            } else {
              core.info("Release notes already contain the current version DOI line.");
            }

      - name: Compute PDF name
        id: pdf_info
        run: |
          SAFE_VERSION=$(printf '%s' "${IPBES_VERSION}" | sed 's/[^A-Za-z0-9._-]/-/g')
          PDF_NAME="IPBES-Data-Management-Vision-${SAFE_VERSION}.pdf"
          echo "pdf_name=${PDF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build website
        run: quarto render . --to html

      - name: Build PDF artifact
        run: |
          mkdir -p build _site/assets
          quarto render IPBES_Data_Vision.qmd --to pdf --output "${{ steps.pdf_info.outputs.pdf_name }}" --output-dir build -M "doi=${IPBES_DOI}"
          cp "build/${{ steps.pdf_info.outputs.pdf_name }}" "_site/assets/IPBES-Data-Management-Vision-latest.pdf"

      - name: Upload PDF and release notes to Zenodo draft
        env:
          ZENODO_DRAFT_ID: ${{ steps.reserve_doi.outputs.draft_deposition_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ github.event.release.id }}
          PDF_FILE: build/${{ steps.pdf_info.outputs.pdf_name }}
        run: |
          python3 - <<'PY'
          import html
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          def fail(message):
              print(message, file=sys.stderr)
              sys.exit(1)

          def request_raw(method, url, payload=None, headers=None):
              req = urllib.request.Request(url, data=payload, method=method)
              for key, value in (headers or {}).items():
                  req.add_header(key, value)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return resp.read().decode("utf-8"), resp.status
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode("utf-8", errors="replace")
                  fail(f"HTTP error ({exc.code}) on {url}: {details}")
              except urllib.error.URLError as exc:
                  fail(f"Connection error on {url}: {exc}")

          def request_json(method, url, payload=None, headers=None):
              body = None
              merged_headers = dict(headers or {})
              if payload is not None:
                  body = json.dumps(payload).encode("utf-8")
                  merged_headers["Content-Type"] = "application/json"
              text, _status = request_raw(method, url, payload=body, headers=merged_headers)
              if not text.strip():
                  return {}
              return json.loads(text)

          target = os.getenv("ACTIVE_ZENODO_TARGET", "").strip() or "production"
          base = os.getenv("ACTIVE_ZENODO_API_BASE", "").strip().rstrip("/")
          token = os.getenv("ACTIVE_ZENODO_TOKEN", "").strip()
          draft_id = os.getenv("ZENODO_DRAFT_ID", "").strip()
          pdf_file = os.getenv("PDF_FILE", "").strip()
          repo = os.getenv("GITHUB_REPOSITORY", "").strip()
          release_id = os.getenv("RELEASE_ID", "").strip()
          github_token = os.getenv("GITHUB_TOKEN", "").strip()

          if not token:
              fail(f"ZENODO_TARGET={target}: missing ACTIVE_ZENODO_TOKEN from resolve step.")
          if not base:
              fail(f"ZENODO_TARGET={target}: missing ACTIVE_ZENODO_API_BASE from resolve step.")
          if not draft_id:
              fail("Missing Zenodo draft deposition id from reserve step.")
          if not pdf_file or not os.path.exists(pdf_file):
              fail(f"PDF file not found: {pdf_file}")

          token_q = urllib.parse.quote(token, safe="")
          draft_url = f"{base}/api/deposit/depositions/{draft_id}?access_token={token_q}"
          draft = request_json("GET", draft_url)
          links = draft.get("links") or {}
          bucket_url = links.get("bucket") or ""
          if not bucket_url:
              fail("Zenodo draft response missing bucket URL.")

          release_notes = ""
          if repo and release_id and github_token:
              gh_url = f"https://api.github.com/repos/{repo}/releases/{release_id}"
              gh_headers = {
                  "Authorization": f"Bearer {github_token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              gh_release = request_json("GET", gh_url, headers=gh_headers)
              release_notes = (gh_release.get("body") or "").strip()
          if not release_notes:
              release_notes = "Release notes not provided."

          metadata = draft.get("metadata") or {}
          metadata["description"] = f"<pre>{html.escape(release_notes)}</pre>"
          request_json("PUT", draft_url, payload={"metadata": metadata})

          filename = os.path.basename(pdf_file)
          upload_url = f"{bucket_url.rstrip('/')}/{urllib.parse.quote(filename)}"
          with open(pdf_file, "rb") as fh:
              pdf_data = fh.read()
          upload_headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/pdf",
          }
          _body, _status = request_raw("PUT", upload_url, payload=pdf_data, headers=upload_headers)

          draft_html_url = (
              links.get("latest_draft_html")
              or links.get("html")
              or f"{base}/deposit/{draft_id}"
          )
          print(f"Uploaded PDF to Zenodo draft deposition {draft_id}.")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write(f"Zenodo draft updated: {draft_html_url}\n")
              summary.write("PDF uploaded and release notes copied to metadata description.\n")
              summary.write("Draft was not published; DOI minting remains a manual step.\n")
          PY

      - name: Upload PDF to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ steps.pdf_info.outputs.pdf_name }}
          overwrite_files: true

      - name: Deploy website to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: _site
          force_orphan: true
          enable_jekyll: false
