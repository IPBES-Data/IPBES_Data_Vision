name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::httr2

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Build website
        env:
          IPBES_VERSION: pr-${{ github.event.pull_request.number }}
          IPBES_RELEASE_DATE: ${{ github.event.pull_request.updated_at }}
          IPBES_DOI: PENDING
          IPBES_DOI_URL: ""
          IPBES_OUTPUT_DIR: _site
          IPBES_BUILD_PDF: "true"
        run: quarto render . --to html

      - name: Build PDF artifact
        env:
          IPBES_VERSION: pr-${{ github.event.pull_request.number }}
          IPBES_RELEASE_DATE: ${{ github.event.pull_request.updated_at }}
          IPBES_DOI: PENDING
          IPBES_DOI_URL: ""
          IPBES_OUTPUT_DIR: _site
          IPBES_BUILD_PDF: "true"
        run: |
          mkdir -p build _site/assets
          SAFE_VERSION=$(printf '%s' "${IPBES_VERSION}" | sed 's/[^A-Za-z0-9._-]/-/g')
          PDF_NAME="IPBES-Data-Management-Vision-${SAFE_VERSION}.pdf"
          quarto render IPBES_Data_Vision.qmd --to pdf --output "${PDF_NAME}" --output-dir build
          cp "build/${PDF_NAME}" "_site/assets/IPBES-Data-Management-Vision-latest.pdf"

      - name: Assert expected artifacts exist
        run: |
          test -s _site/index.html
          test -s _site/older-releases.html
          test -s _site/assets/IPBES-Data-Management-Vision-latest.pdf
